<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Figure 3 — EO 14365 § 8(b) Reservations Mapped to State AI Law Buckets</title>
<style>
  body {
    font-family: "Times New Roman", Georgia, serif;
    background: #ffffff;
    color: #1a1a1a;
    max-width: 900px;
    margin: 40px auto;
    padding: 0 30px;
    line-height: 1.5;
  }
  .figure-caption {
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .figure-title {
    font-size: 15px;
    font-style: italic;
    margin-bottom: 20px;
  }
  .svg-wrap {
    border: 1px solid #dcdcdc;
    border-radius: 6px;
    padding: 16px;
    background: #ffffff;
  }
  .footer-note {
    font-size: 11px;
    font-style: italic;
    color: #555555;
    margin-top: 14px;
  }
  svg { display: block; width: 100%; height: auto; background: #ffffff; }

  .col-hdr       { fill: #1a1a1a; font-size: 13px; font-weight: bold; font-family: "Times New Roman"; }

  /* § 8(b) reservation boxes (neutral gray — these are EO carve-outs) */
  .res-box       { fill: #f2f2f0; stroke: #7a7a7a; stroke-width: 1; }
  .res-lbl       { fill: #1a1a1a; font-size: 13px; font-weight: bold; font-family: "Times New Roman"; }
  .res-sub       { fill: #555555; font-size: 11px; font-style: italic; font-family: "Times New Roman"; }

  /* Bucket boxes - color-coded by bucket type */
  .conduct-box   { fill: #e6f3ec; stroke: #2E7D5B; stroke-width: 1.5; }
  .conduct-lbl   { fill: #1a5a3e; font-size: 13px; font-weight: bold; font-family: "Times New Roman"; }
  .conduct-sub   { fill: #2E7D5B; font-size: 11px; font-style: italic; font-family: "Times New Roman"; }

  .process-box   { fill: #ecebf5; stroke: #3C3489; stroke-width: 1.5; }
  .process-lbl   { fill: #2A2566; font-size: 13px; font-weight: bold; font-family: "Times New Roman"; }
  .process-sub   { fill: #3C3489; font-size: 11px; font-style: italic; font-family: "Times New Roman"; }

  .output-box    { fill: #fdeaea; stroke: #A32D2D; stroke-width: 1.5; }
  .output-lbl    { fill: #6b0e0e; font-size: 13px; font-weight: bold; font-family: "Times New Roman"; }
  .output-sub    { fill: #A32D2D; font-size: 11px; font-style: italic; font-family: "Times New Roman"; }

  .mixed-box     { fill: #fbf0df; stroke: #8B5A00; stroke-width: 1.5; }
  .mixed-lbl     { fill: #5a3b00; font-size: 13px; font-weight: bold; font-family: "Times New Roman"; }
  .mixed-sub     { fill: #8B5A00; font-size: 11px; font-style: italic; font-family: "Times New Roman"; }

  /* Arrows — green to signal "maps to reservation" */
  .arrow-preserve { stroke: #2E7D5B; stroke-width: 1.5; fill: none; }
  .arrow-direct   { stroke: #A32D2D; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }

  .legend        { fill: #333; font-size: 11px; font-family: "Times New Roman"; }
  .legend-bold   { fill: #1a1a1a; font-size: 11px; font-weight: bold; font-family: "Times New Roman"; }
</style>
</head>
<body>
  <div class="figure-caption">FIGURE 3.</div>
  <div class="figure-title">Executive Order 14365 § 8(b) legislative reservations mapped to the four state AI law buckets.</div>

  <div class="svg-wrap">
    <svg viewBox="0 0 820 620" role="img"
         aria-label="Diagram showing that EO 14365 section 8(b)'s four reserved categories (child safety, AI compute infrastructure, state procurement, other reserved topics) all map onto the Conduct bucket of state AI law, while the Process, Output, and Mixed buckets sit outside the reservations and are subject to the Executive Order's direct levers.">
      <title>EO 14365 § 8(b) legislative-recommendation reservations mapped to state AI law buckets</title>

      <defs>
        <marker id="green-arrow" viewBox="0 0 10 10" refX="8" refY="5"
                markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#2E7D5B" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <marker id="red-arrow" viewBox="0 0 10 10" refX="8" refY="5"
                markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Column headers -->
      <text x="160" y="36" text-anchor="middle" class="col-hdr">§ 8(b) Legislative Reservations</text>
      <text x="640" y="36" text-anchor="middle" class="col-hdr">State AI Law Buckets (193 enacted)</text>

      <!-- ===== LEFT COLUMN: § 8(b) RESERVATIONS ===== -->

      <!-- 1. Child safety -->
      <rect x="40" y="60" width="240" height="60" rx="5" class="res-box"/>
      <text x="160" y="86"  text-anchor="middle" class="res-lbl">Child safety protections</text>
      <text x="160" y="106" text-anchor="middle" class="res-sub">CSAM, non-consensual intimate imagery</text>

      <!-- 2. AI compute -->
      <rect x="40" y="140" width="240" height="60" rx="5" class="res-box"/>
      <text x="160" y="166" text-anchor="middle" class="res-lbl">AI compute, data centers</text>
      <text x="160" y="186" text-anchor="middle" class="res-sub">Infrastructure siting and permitting</text>

      <!-- 3. State procurement -->
      <rect x="40" y="220" width="240" height="60" rx="5" class="res-box"/>
      <text x="160" y="246" text-anchor="middle" class="res-lbl">State AI procurement</text>
      <text x="160" y="266" text-anchor="middle" class="res-sub">Government use of AI systems</text>

      <!-- 4. Other -->
      <rect x="40" y="300" width="240" height="60" rx="5" class="res-box"/>
      <text x="160" y="326" text-anchor="middle" class="res-lbl">Other reserved topics</text>
      <text x="160" y="346" text-anchor="middle" class="res-sub">As determined by the Special Advisor</text>

      <!-- ===== RIGHT COLUMN: BUCKETS ===== -->

      <!-- Conduct -->
      <rect x="520" y="60" width="240" height="90" rx="5" class="conduct-box"/>
      <text x="640" y="88"  text-anchor="middle" class="conduct-lbl">Conduct — 84 statutes</text>
      <text x="640" y="110" text-anchor="middle" class="conduct-sub">Preserved by § 8(b) reservations;</text>
      <text x="640" y="126" text-anchor="middle" class="conduct-sub">43.5% of dataset</text>
      <text x="640" y="142" text-anchor="middle" class="conduct-sub">Largest bucket</text>

      <!-- Process -->
      <rect x="520" y="180" width="240" height="90" rx="5" class="process-box"/>
      <text x="640" y="208" text-anchor="middle" class="process-lbl">Process — 31 statutes</text>
      <text x="640" y="230" text-anchor="middle" class="process-sub">Outside § 8(b) reservations;</text>
      <text x="640" y="246" text-anchor="middle" class="process-sub">Note defends preservation through</text>
      <text x="640" y="262" text-anchor="middle" class="process-sub">express savings clause</text>

      <!-- Output -->
      <rect x="520" y="300" width="240" height="90" rx="5" class="output-box"/>
      <text x="640" y="328" text-anchor="middle" class="output-lbl">Output — 60 statutes</text>
      <text x="640" y="350" text-anchor="middle" class="output-sub">Outside § 8(b); targeted by</text>
      <text x="640" y="366" text-anchor="middle" class="output-sub">EO §§ 4 and 7; Kohls predicts</text>
      <text x="640" y="382" text-anchor="middle" class="output-sub">strict-scrutiny failure</text>

      <!-- Mixed -->
      <rect x="520" y="420" width="240" height="90" rx="5" class="mixed-box"/>
      <text x="640" y="448" text-anchor="middle" class="mixed-lbl">Mixed — 18 statutes</text>
      <text x="640" y="470" text-anchor="middle" class="mixed-sub">Healthcare AI dominant sub-cluster;</text>
      <text x="640" y="486" text-anchor="middle" class="mixed-sub">severability principle addresses</text>
      <text x="640" y="502" text-anchor="middle" class="mixed-sub">output-adjacent provisions only</text>

      <!-- ===== ARROWS ===== -->
      <!-- All four § 8(b) reservations map to Conduct bucket -->
      <line x1="280" y1="90"  x2="515" y2="100" class="arrow-preserve" marker-end="url(#green-arrow)"/>
      <line x1="280" y1="170" x2="515" y2="108" class="arrow-preserve" marker-end="url(#green-arrow)"/>
      <line x1="280" y1="250" x2="515" y2="116" class="arrow-preserve" marker-end="url(#green-arrow)"/>
      <line x1="280" y1="330" x2="515" y2="124" class="arrow-preserve" marker-end="url(#green-arrow)"/>

      <!-- ===== LEGEND ===== -->
      <g transform="translate(40, 430)">
        <text x="0" y="0" class="legend-bold">Arrows:</text>
        <line x1="0" y1="16" x2="40" y2="16" class="arrow-preserve" marker-end="url(#green-arrow)"/>
        <text x="48" y="20" class="legend">“maps to” — § 8(b) reserves this bucket from federal preemption</text>
      </g>

      <g transform="translate(40, 470)">
        <text x="0" y="0" class="legend-bold">Key implication:</text>
        <text x="0" y="20" class="legend">All four § 8(b) reservations describe CONDUCT statutes. The § 8(b)</text>
        <text x="0" y="36" class="legend">carve-outs map cleanly onto the largest bucket in the dataset —</text>
        <text x="0" y="52" class="legend">43.5% of enacted state AI law is already preserved from preemption.</text>
      </g>

      <!-- Footer statements -->
      <text x="40" y="582" class="legend">§ 8(b) reservations govern only the legislative recommendation in § 8(a).</text>
      <text x="40" y="600" class="legend">Direct EO levers in §§ 3, 5, 6, and 7 reach PROCESS, OUTPUT, and MIXED regardless.</text>

    </svg>
  </div>

  <div class="footer-note">
    Source: Executive Order 14,365, § 8(b), 90 Fed. Reg. 58,499, 58,501 (Dec. 11, 2025); author's taxonomic coding of 193-law dataset. See notes 109, 157.
  </div>
</body>
</html>
